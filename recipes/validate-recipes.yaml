# validate-recipes.yaml
# Recipe Validator v1.0.0
# Validates recipe YAML files in a bundle repository for structural correctness,
# best practices, and semantic consistency.
#
# CHANGELOG:
# v1.0.0 - Initial release
#        - Phase 0: Environment check (engine availability detection)
#        - Phase 1: Recipe discovery (recursive scan + filter)
#        - Phase 2: Structural validation (engine + gap coverage)
#        - Phase 3: Best practices check (naming, timeouts, error handling, prompts, versioning)
#        - Phase 4: Semantic validation (agent refs, sub-recipes, variable flow, loops, conditions)
#        - Phase 5: Quality classification (deterministic scoring)
#        - Phase 6: Report synthesis (bash quick-pass or LLM)
#
# Usage:
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=recipes:recipes/validate-recipes.yaml \
#     context='{"repo_path": "/path/to/bundle-repo"}'
#
# With custom recipes directory:
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=recipes:recipes/validate-recipes.yaml \
#     context='{"repo_path": "/path/to/repo", "recipes_dir": "my-recipes"}'
#
# QUALITY LEVELS:
# - good: Clean bill of health — no issues at all
# - polish: Only SUGGESTIONs — missing tags, short prompts, naming conventions
# - needs_work: WARNINGs present — missing timeouts, condition issues, convergence concerns
# - critical: ERRORs present — YAML parse failures, missing required fields, broken references

name: validate-recipes
description: |
  Validates Amplifier recipe YAML files in a bundle repository against:

  - **Structural Correctness** (ERROR): Valid YAML, required fields, step schema, type constraints
  - **Best Practices** (WARNING/SUGGESTION): Naming conventions, error handling, timeouts, prompts, versioning
  - **Semantic Consistency** (ERROR/WARNING): Agent references, sub-recipe paths, variable flow, loop convergence

  Produces a validation report with findings categorized by severity and actionable remediation.

  **Features:**
  - Graceful degradation when recipe engine not installed (structural_only mode)
  - Per-recipe isolation — one broken recipe doesn't block validation of others
  - Deterministic quality classification with explicit PASS thresholds
  - Quick-approval path for clean repos (no unnecessary LLM analysis)
  - Configurable recipes directory and known agent patterns
version: "1.0.0"
author: "Amplifier Recipes Collection"
tags: ["recipes", "validation", "quality", "audit", "structure", "best-practices"]

context:
  repo_path: ""              # Required: path to bundle repository
  recipes_dir: "recipes"     # Optional: subdirectory containing recipes (default: "recipes")
  known_agents: ""           # Optional: JSON list of known external namespace:agent patterns
                             # e.g., '["foundation:*", "recipes:*", "superpowers:*"]'

steps:
  # ============================================================================
  # PHASE 0: Environment Check
  # Detect whether recipe engine validation models are available
  # Sets validation_mode: "full" or "structural_only"
  # ============================================================================

  - id: "environment-check"
    type: "bash"
    command: |
      python3 << 'EOF'
      import json
      import sys
      from pathlib import Path

      results = {
          "phase": "environment",
          "python_version": sys.version.split()[0],
          "engine_available": False,
          "yaml_available": False,
          "repo_path": "{{repo_path}}",
          "repo_exists": False,
          "validation_mode": "structural_only",
          "errors": []
      }

      # Check 1: PyYAML availability
      try:
          import yaml
          results["yaml_available"] = True
      except ImportError:
          results["errors"].append({
              "type": "import_error",
              "message": "PyYAML not available — required for recipe parsing",
              "suggestion": "pip install pyyaml"
          })

      # Check 2: Recipe engine availability (enables full validation)
      try:
          from amplifier_module_tool_recipes.models import Recipe
          from amplifier_module_tool_recipes.validator import validate_recipe
          results["engine_available"] = True
      except ImportError:
          pass  # Not an error — we degrade gracefully

      # Check 3: Repository path exists
      repo_path = Path("{{repo_path}}").expanduser().resolve()
      if repo_path.exists() and repo_path.is_dir():
          results["repo_exists"] = True
          results["repo_path_resolved"] = str(repo_path)
      else:
          results["errors"].append({
              "type": "path_error",
              "message": f"Repository path does not exist or is not a directory: {{repo_path}}"
          })

      # Determine validation mode
      if results["engine_available"] and results["yaml_available"]:
          results["validation_mode"] = "full"
          results["mode_description"] = "Full validation: engine models + gap coverage + best practices + semantics"
      elif results["yaml_available"]:
          results["validation_mode"] = "structural_only"
          results["mode_description"] = "Structural only: raw YAML parsing without engine model validation"
      else:
          results["validation_mode"] = "minimal"
          results["mode_description"] = "Minimal: cannot parse YAML — only file-level checks possible"
          results["errors"].append({
              "type": "degraded_mode",
              "message": "Neither PyYAML nor recipe engine available — validation severely limited"
          })

      print(json.dumps(results))
      EOF
    output: "env_check"
    parse_json: true
    timeout: 30

  # ============================================================================
  # PHASE 1: Recipe Discovery
  # Recursively scan recipes_dir and examples/ for YAML recipe files.
  # Filters test fixtures, captures parse errors, classifies sub-recipes.
  # ============================================================================

  - id: "recipe-discovery"
    type: "bash"
    depends_on: ["environment-check"]
    command: |
      python3 << 'EOF'
      import json
      import sys
      from pathlib import Path

      def _process_yaml_file(yaml_path, base, results, sub_recipe_refs):
          """Process a single YAML file — categorize as recipe, non-recipe, or parse error."""
          import yaml

          rel = str(yaml_path.relative_to(base)).replace("\\", "/")
          rel_check = "/" + rel

          # Skip test fixtures
          if "/tests/" in rel_check or "/test_" in rel_check:
              return

          file_size = yaml_path.stat().st_size

          # Attempt YAML parse
          data = None
          parse_error_msg = None
          try:
              data = yaml.safe_load(yaml_path.read_text())
          except Exception as exc:
              parse_error_msg = str(exc)
              results["parse_errors"].append({
                  "path": str(yaml_path),
                  "relative_path": rel,
                  "error": parse_error_msg,
              })

          # If parse failed, record as recipe with parse_error=True and return
          if parse_error_msg is not None:
              results["recipes"].append({
                  "path": str(yaml_path),
                  "relative_path": rel,
                  "filename": yaml_path.name,
                  "name": None,
                  "version": None,
                  "description": None,
                  "size_bytes": file_size,
                  "step_count": 0,
                  "is_staged": False,
                  "has_context": False,
                  "has_tags": False,
                  "parse_error": True,
                  "is_sub_recipe": False,
              })
              return

          # Non-dict or missing required keys → not a recipe
          if not isinstance(data, dict):
              results["non_recipe_yaml"].append({
                  "path": str(yaml_path),
                  "relative_path": rel,
              })
              return

          has_name = bool(data.get("name"))
          has_steps_or_stages = ("steps" in data) or ("stages" in data)

          if not (has_name and has_steps_or_stages):
              results["non_recipe_yaml"].append({
                  "path": str(yaml_path),
                  "relative_path": rel,
              })
              return

          # It's a recipe — collect info
          steps = data.get("steps") or []
          stages = data.get("stages") or []
          is_staged = bool(stages)

          # Count all steps (including steps nested inside stages)
          step_count = len(steps)
          for stage in stages:
              if isinstance(stage, dict):
                  step_count += len(stage.get("steps") or [])

          # Collect sub-recipe references from type='recipe' steps
          all_steps = list(steps)
          for stage in stages:
              if isinstance(stage, dict):
                  all_steps.extend(stage.get("steps") or [])

          for step in all_steps:
              if isinstance(step, dict) and step.get("type") == "recipe":
                  for field in ("recipe_path", "recipe", "path", "recipe_file"):
                      ref = step.get(field)
                      if ref:
                          sub_recipe_refs.add(str(ref))
                          break

          version_val = data.get("version")
          recipe_info = {
              "path": str(yaml_path),
              "relative_path": rel,
              "filename": yaml_path.name,
              "name": data.get("name"),
              "version": str(version_val) if version_val is not None else None,
              "description": str(data.get("description", "") or "")[:200] or None,
              "size_bytes": file_size,
              "step_count": step_count,
              "is_staged": is_staged,
              "has_context": "context" in data,
              "has_tags": bool(data.get("tags")),
              "parse_error": False,
              "is_sub_recipe": False,
          }
          results["recipes"].append(recipe_info)


      def discover_recipes(repo_path, recipes_dir):
          """Discover all recipe YAML files in a repository."""
          # Early exit if PyYAML not available
          try:
              import yaml  # noqa: F401
          except ImportError:
              return {
                  "phase": "discovery",
                  "skipped": True,
                  "reason": "PyYAML not available — install with: pip install pyyaml",
                  "repo_path": repo_path,
                  "recipes_dir": recipes_dir,
                  "recipes": [],
                  "non_recipe_yaml": [],
                  "parse_errors": [],
                  "total_count": 0,
                  "search_paths": [],
                  "errors": [],
              }

          repo = Path(repo_path).expanduser().resolve()
          results = {
              "phase": "discovery",
              "repo_path": str(repo),
              "recipes_dir": recipes_dir,
              "recipes": [],
              "non_recipe_yaml": [],
              "parse_errors": [],
              "total_count": 0,
              "search_paths": [],
              "errors": [],
          }

          if not repo.exists() or not repo.is_dir():
              results["errors"].append({
                  "type": "path_error",
                  "message": f"Repository path does not exist: {repo_path}",
              })
              return results

          sub_recipe_refs = set()

          # Determine directories to scan
          scan_dirs = []

          # 1. Configured recipes_dir
          configured_dir = repo / recipes_dir
          if configured_dir.exists() and configured_dir.is_dir():
              scan_dirs.append(configured_dir)
              results["search_paths"].append(str(configured_dir))

          # 2. examples/ directory (if different from recipes_dir and it exists)
          if recipes_dir != "examples":
              examples_dir = repo / "examples"
              if examples_dir.exists() and examples_dir.is_dir():
                  scan_dirs.append(examples_dir)
                  results["search_paths"].append(str(examples_dir))

          # Scan each directory recursively
          for scan_dir in scan_dirs:
              yaml_files = sorted(
                  list(scan_dir.rglob("*.yaml")) + list(scan_dir.rglob("*.yml"))
              )
              for yaml_path in yaml_files:
                  _process_yaml_file(yaml_path, repo, results, sub_recipe_refs)

          # Post-processing: classify is_sub_recipe
          for recipe in results["recipes"]:
              r_path = recipe.get("path", "")
              r_name = recipe.get("name") or ""
              for ref in sub_recipe_refs:
                  if ref in r_path or (r_name and ref == r_name):
                      recipe["is_sub_recipe"] = True
                      break

          results["total_count"] = len(results["recipes"])
          return results


      output = discover_recipes("{{repo_path}}", "{{recipes_dir}}")
      print(json.dumps(output))
      EOF
    output: "recipe_discovery"
    parse_json: true
    timeout: 30

  # ============================================================================
  # PHASE 2: Structural Validation
  # Engine validation (full mode) + gap coverage checks for each discovered
  # recipe. Detects unknown keys, missing required fields, invalid types,
  # duplicate IDs, orphan fields, and condition syntax errors.
  # ============================================================================

  - id: "structural-validation"
    type: "bash"
    depends_on: ["recipe-discovery"]
    on_error: "continue"
    command: |
      python3 << 'EOF'
      import json
      import re
      import sys
      from pathlib import Path

      _env_check_raw = r"""{{env_check}}"""
      _recipe_discovery_raw = r"""{{recipe_discovery}}"""
      env_check = json.loads(_env_check_raw)
      recipe_discovery = json.loads(_recipe_discovery_raw)

      validation_mode = env_check.get("validation_mode", "structural_only")

      VALID_RECIPE_KEYS = {
          "name", "description", "version", "author", "created", "updated",
          "tags", "context", "steps", "stages", "recursion", "rate_limiting",
          "orchestrator",
      }

      VALID_STEP_KEYS = {
          "id", "type", "agent", "prompt", "mode", "agent_config", "recipe",
          "context", "command", "cwd", "env", "output_exit_code", "output",
          "condition", "foreach", "as", "collect", "parallel", "max_iterations",
          "timeout", "retry", "on_error", "depends_on", "parse_json",
          "while_condition", "max_while_iterations", "break_when", "update_context",
          "steps", "recursion", "provider", "model", "provider_preferences",
          "model_role",
      }

      VALID_STEP_TYPES = {"agent", "bash", "recipe"}


      def validate_recipe_structural(recipe_info):
          """Validate a single recipe structurally. Returns list of findings."""
          findings = []
          path = recipe_info.get("path", "")

          # 1. Handle parse_error recipes — YAML_PARSE_ERROR finding
          if recipe_info.get("parse_error"):
              findings.append({
                  "code": "YAML_PARSE_ERROR",
                  "severity": "ERROR",
                  "message": "Recipe file failed YAML parsing",
                  "detail": path,
              })
              return findings

          # 2. Fresh parse for detailed validation
          try:
              import yaml
              data = yaml.safe_load(Path(path).read_text())
          except Exception as exc:
              findings.append({
                  "code": "YAML_PARSE_ERROR",
                  "severity": "ERROR",
                  "message": f"Failed to parse recipe: {exc}",
                  "detail": str(exc),
              })
              return findings

          if not isinstance(data, dict):
              findings.append({
                  "code": "INVALID_STRUCTURE",
                  "severity": "ERROR",
                  "message": "Recipe is not a YAML mapping",
                  "detail": "",
              })
              return findings

          # 3. Engine validation when validation_mode == 'full'
          if validation_mode == "full":
              try:
                  from amplifier_module_tool_recipes.models import Recipe
                  from amplifier_module_tool_recipes.validator import validate_recipe
                  try:
                      recipe_obj = Recipe.from_yaml(path)
                      result = validate_recipe(recipe_obj)
                      for err in result.errors:
                          findings.append({
                              "code": "ENGINE_ERROR",
                              "severity": "ERROR",
                              "message": str(err),
                              "detail": "",
                          })
                      for warn in result.warnings:
                          findings.append({
                              "code": "ENGINE_WARNING",
                              "severity": "WARNING",
                              "message": str(warn),
                              "detail": "",
                          })
                  except Exception as exc:
                      findings.append({
                          "code": "ENGINE_VALIDATION_FAILED",
                          "severity": "ERROR",
                          "message": f"Engine validation exception: {exc}",
                          "detail": str(exc),
                      })
              except ImportError:
                  pass  # Engine not available — graceful degradation

          # 4. Unknown top-level keys (WARNING)
          for key in data.keys():
              if key not in VALID_RECIPE_KEYS:
                  findings.append({
                      "code": "UNKNOWN_RECIPE_KEY",
                      "severity": "WARNING",
                      "message": f"Unknown top-level key: '{key}'",
                      "detail": key,
                  })

          # 5. Mixed mode: both steps and stages (ERROR)
          if "steps" in data and "stages" in data:
              findings.append({
                  "code": "MIXED_MODE",
                  "severity": "ERROR",
                  "message": "Recipe has both 'steps' and 'stages' — use one or the other",
                  "detail": "",
              })

          # 6. Missing required fields
          if not data.get("name"):
              findings.append({
                  "code": "MISSING_NAME",
                  "severity": "ERROR",
                  "message": "Recipe is missing required 'name' field",
                  "detail": "",
              })

          description = data.get("description", "")
          if not description or not str(description).strip():
              findings.append({
                  "code": "MISSING_DESCRIPTION",
                  "severity": "ERROR",
                  "message": "Recipe is missing required 'description' field or it is empty",
                  "detail": "",
              })

          if "version" not in data:
              findings.append({
                  "code": "MISSING_VERSION",
                  "severity": "ERROR",
                  "message": "Recipe is missing required 'version' field",
                  "detail": "",
              })

          # 7. Version format: must match X.Y.Z
          version = str(data["version"]) if data.get("version") is not None else ""
          if version and not re.match(r"^\d+\.\d+\.\d+$", version):
              findings.append({
                  "code": "INVALID_VERSION",
                  "severity": "ERROR",
                  "message": f"Version '{version}' does not match semver format (X.Y.Z)",
                  "detail": version,
              })

          # 8. Version placeholder '0.0.0' (WARNING)
          if version == "0.0.0":
              findings.append({
                  "code": "PLACEHOLDER_VERSION",
                  "severity": "WARNING",
                  "message": "Version '0.0.0' is a placeholder — use a real version",
                  "detail": version,
              })

          # 9. Collect all steps (including steps nested inside stages)
          steps = data.get("steps") or []
          stages = data.get("stages") or []
          all_steps = list(steps)
          for stage in stages:
              if isinstance(stage, dict):
                  all_steps.extend(stage.get("steps") or [])

          # 10. Duplicate step IDs (ERROR)
          seen_ids = set()
          for step in all_steps:
              if isinstance(step, dict):
                  step_id = step.get("id")
                  if step_id:
                      if step_id in seen_ids:
                          findings.append({
                              "code": "DUPLICATE_STEP_ID",
                              "severity": "ERROR",
                              "message": f"Duplicate step ID: '{step_id}'",
                              "detail": step_id,
                          })
                      else:
                          seen_ids.add(step_id)

          # 11. Duplicate output names (WARNING)
          seen_outputs = set()
          for step in all_steps:
              if isinstance(step, dict):
                  output_name = step.get("output")
                  if output_name:
                      if output_name in seen_outputs:
                          findings.append({
                              "code": "DUPLICATE_OUTPUT",
                              "severity": "WARNING",
                              "message": f"Duplicate output name: '{output_name}'",
                              "detail": output_name,
                          })
                      else:
                          seen_outputs.add(output_name)

          # 12. Per-step validations
          for step in all_steps:
              if not isinstance(step, dict):
                  continue
              step_id = step.get("id", "(unknown)")

              # Unknown step keys (WARNING)
              for key in step.keys():
                  if key not in VALID_STEP_KEYS:
                      findings.append({
                          "code": "UNKNOWN_STEP_KEY",
                          "severity": "WARNING",
                          "message": f"Step '{step_id}': unknown key '{key}'",
                          "detail": key,
                      })

              # Invalid step type (ERROR)
              step_type = step.get("type")
              if step_type and step_type not in VALID_STEP_TYPES:
                  findings.append({
                      "code": "INVALID_STEP_TYPE",
                      "severity": "ERROR",
                      "message": (
                          f"Step '{step_id}': invalid type '{step_type}'"
                          f" (valid: {sorted(VALID_STEP_TYPES)})"
                      ),
                      "detail": step_type,
                  })

              # Empty prompt (ERROR)
              if "prompt" in step and not str(step.get("prompt") or "").strip():
                  findings.append({
                      "code": "EMPTY_PROMPT",
                      "severity": "ERROR",
                      "message": f"Step '{step_id}': prompt is empty",
                      "detail": step_id,
                  })

              # Empty command (ERROR)
              if "command" in step and not str(step.get("command") or "").strip():
                  findings.append({
                      "code": "EMPTY_COMMAND",
                      "severity": "ERROR",
                      "message": f"Step '{step_id}': command is empty",
                      "detail": step_id,
                  })

              # Orphan fields: collect / as / parallel without foreach (WARNING)
              has_foreach = "foreach" in step
              if "collect" in step and not has_foreach:
                  findings.append({
                      "code": "ORPHAN_COLLECT",
                      "severity": "WARNING",
                      "message": f"Step '{step_id}': 'collect' used without 'foreach'",
                      "detail": step_id,
                  })
              if "as" in step and not has_foreach:
                  findings.append({
                      "code": "ORPHAN_AS",
                      "severity": "WARNING",
                      "message": f"Step '{step_id}': 'as' used without 'foreach'",
                      "detail": step_id,
                  })
              if "parallel" in step and not has_foreach:
                  findings.append({
                      "code": "ORPHAN_PARALLEL",
                      "severity": "WARNING",
                      "message": f"Step '{step_id}': 'parallel' used without 'foreach'",
                      "detail": step_id,
                  })

              # break_when without while_condition (WARNING)
              if "break_when" in step and "while_condition" not in step:
                  findings.append({
                      "code": "ORPHAN_BREAK_WHEN",
                      "severity": "WARNING",
                      "message": f"Step '{step_id}': 'break_when' used without 'while_condition'",
                      "detail": step_id,
                  })

              # Condition syntax: invalid operators ===, <>, !== (ERROR)
              condition = str(step.get("condition") or "")
              for invalid_op in ["===", "<>", "!=="]:
                  if invalid_op in condition:
                      findings.append({
                          "code": "INVALID_CONDITION_OP",
                          "severity": "ERROR",
                          "message": (
                              f"Step '{step_id}': condition uses invalid"
                              f" operator '{invalid_op}'"
                          ),
                          "detail": invalid_op,
                      })

          # 13. Staged mode: approval_required without prompt (WARNING)
          for stage in stages:
              if isinstance(stage, dict):
                  if stage.get("approval_required") and not stage.get("prompt"):
                      stage_id = stage.get("id", "(unknown)")
                      findings.append({
                          "code": "APPROVAL_NO_PROMPT",
                          "severity": "WARNING",
                          "message": (
                              f"Stage '{stage_id}': approval_required"
                              " but no approval prompt defined"
                          ),
                          "detail": stage_id,
                      })

          return findings


      # Process all recipes from discovery
      results = []
      for recipe_info in recipe_discovery.get("recipes", []):
          path = recipe_info.get("path", "")
          findings = validate_recipe_structural(recipe_info)
          error_count = sum(1 for f in findings if f["severity"] == "ERROR")
          warning_count = sum(1 for f in findings if f["severity"] == "WARNING")
          results.append({
              "path": path,
              "relative_path": recipe_info.get("relative_path", ""),
              "name": recipe_info.get("name"),
              "findings": findings,
              "error_count": error_count,
              "warning_count": warning_count,
          })

      # Build summary
      total = len(results)
      clean = sum(1 for r in results if r["error_count"] == 0 and r["warning_count"] == 0)
      with_errors = sum(1 for r in results if r["error_count"] > 0)
      with_warnings = sum(1 for r in results if r["warning_count"] > 0)
      total_errors = sum(r["error_count"] for r in results)
      total_warnings = sum(r["warning_count"] for r in results)

      output = {
          "phase": "structural",
          "validation_mode": validation_mode,
          "results": results,
          "summary": {
              "total": total,
              "clean": clean,
              "with_errors": with_errors,
              "with_warnings": with_warnings,
              "total_errors": total_errors,
              "total_warnings": total_warnings,
          },
      }

      print(json.dumps(output))
      EOF
    output: "structural_results"
    parse_json: true
    timeout: 120
